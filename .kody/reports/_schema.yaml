type: object
required:
  - generatedAt
  - findings
properties:
  generatedAt:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the report was produced.
  dutySlug:
    type: string
    description: Which duty produced this report.
  reviewStatus:
    type: string
    enum:
      - none
      - info
      - action-needed
      - assigned
      - reviewed
    description: Whether another duty should triage or review the report.
  reviewArea:
    type: string
    description: Routing area used by report review assignment.
  findings:
    type: array
    items:
      type: object
      required:
        - id
        - severity
        - title
      properties:
        id:
          type: string
          description: Stable identifier for this finding.
        severity:
          type: string
          enum:
            - high
            - medium
            - low
          description: Impact level.
        title:
          type: string
          description: One-line summary of the finding.
        data:
          type: object
          description: Structured data specific to this finding type.
        linkedUrl:
          type: string
          format: uri
          description: Optional link to the source.
  suggestedActions:
    type: array
    description: Optional actions the dashboard can render on the report.
    items:
      type: object
      required:
        - id
        - type
        - label
      properties:
        id:
          type: string
          description: Stable identifier for this suggested action.
        type:
          type: string
          enum:
            - dispatch
            - create-task
            - dismiss
          description: Dashboard action type.
        label:
          type: string
          description: Button/display label.
        reason:
          type: string
          description: Short explanation for why this action is suggested.
        executable:
          type: string
          description: Required for dispatch actions.
        target:
          type: integer
          description: Required issue/PR number for dispatch actions.
        title:
          type: string
          description: Required task title for create-task actions.
        body:
          type: string
          description: Optional task body for create-task actions.
        labels:
          type: string
          description: Optional comma-separated task labels.
