name: debug-pty

on: workflow_dispatch

jobs:
  repro:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Extract relay and child scripts
        run: |
          python3 - <<'PY'
          import re
          src = open("packages/fly/src/plugin/terminal/bridge.ts").read()
          m = re.search(r"TERMINAL_BRIDGE_PTY_RELAY_SCRIPT = String\.raw`(.*?)`;", src, re.S)
          open("/tmp/relay.py", "w").write(m.group(1))
          child = """import os
          import sys
          import termios
          fd = sys.stdin.fileno()
          attrs = termios.tcgetattr(fd)
          attrs[3] = attrs[3] | termios.ECHO
          termios.tcsetattr(fd, termios.TCSANOW, attrs)
          data = os.read(fd, 1024)
          os.write(sys.stdout.fileno(), b"REMOTE:" + data)
          """
          open("/tmp/child.py", "w").write("\n".join(l.strip() for l in child.splitlines()))
          PY
          pip install --quiet py-spy
      - name: Run relay in background and dump stacks
        run: |
          set -x
          ( printf 'abc\n'; sleep 60 ) | python3 /tmp/relay.py python3 /tmp/child.py > /tmp/out.txt 2>/tmp/err.txt &
          sleep 5
          ps -ef | grep -E "relay|child" | grep -v grep
          for pid in $(pgrep -f "relay.py|child.py"); do
            echo "===== py-spy dump pid $pid ====="
            sudo $(which py-spy) dump --pid "$pid" --nonblocking || sudo $(which py-spy) dump --pid "$pid" || true
          done
          echo "--- stdout ---"; cat -A /tmp/out.txt
          echo "--- stderr ---"; cat /tmp/err.txt
          sudo pkill -9 -f relay.py || true
          sudo pkill -9 -f child.py || true
