name: E2E Tests

on:
  # Run on every PR preview deployment
  pull_request:
    branches: [main]
  # Also run on demand for the production deployment
  workflow_dispatch:
    inputs:
      target:
        description: "Target deployment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - preview
  # Nightly smoke test against production
  schedule:
    - cron: "0 6 * * 1-5" # Weekdays at 6am UTC

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Token-only auth — allows the dashboard to work without OAuth in tests
  KODY_BOT_TOKEN: ${{ secrets.KODY_BOT_TOKEN }}

jobs:
  # ─── Vitest: unit + integration (fast, no deploy needed) ─────────────────
  vitest:
    name: Vitest (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Run vitest
        run: pnpm test
        env:
          # chat-trigger.int.spec.ts needs this to mint the HMAC token.
          KODY_SESSION_SECRET: ci-test-secret-do-not-use-in-prod

  # ─── Deploy to Vercel Preview ──────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    # Only run deploy for PRs or manual preview runs
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'preview')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel env vars
        run: vercel env pull .env --environment=production -y
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        id: deploy
        run: |
          OUTPUT=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$OUTPUT"
          # Extract URL — Vercel prints "https://<project>-<hash>.vercel.app"
          URL=$(echo "$OUTPUT" | grep -E "https://[^ ]+\.vercel\.app" | tail -1)
          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const prNumber = context.payload.pull_request?.number;
            if (!previewUrl || !prNumber) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `🚀 E2E preview deployed: ${previewUrl}\n\nRunning tests...`,
            });

  # ─── Run E2E Tests ──────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    needs: deploy-preview
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, mobile-chrome]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E Tests (fast + mocked, excludes chat-real-system)
        run: pnpm exec playwright test --grep-invert "@real"
        env:
          # Point to the preview URL from the deploy step
          BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          # Bot token for token-only auth (dashboard works without OAuth)
          KODY_BOT_TOKEN: ${{ secrets.KODY_BOT_TOKEN }}
          # Skip snapshot updates
          CI: "true"

  # ─── Production Smoke (scheduled / manual) ───────────────────────────────────
  smoke-prod:
    name: Production Smoke
    runs-on: ubuntu-latest
    # Don't run deploy step — use production URL directly
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run API smoke tests against production
        run: pnpm exec playwright test --grep-invert "@real"
        env:
          # Test against production
          BASE_URL: https://kody-dashboard-mwoy3ttr6-aharon-yair-cohens-projects.vercel.app
          KODY_BOT_TOKEN: ${{ secrets.KODY_BOT_TOKEN }}
          CI: "true"

      - name: Run real-system chat e2e (nightly only)
        if: github.event_name == 'schedule'
        run: pnpm exec playwright test tests/e2e/chat-real-system.spec.ts
        env:
          BASE_URL: https://kody-dashboard-mwoy3ttr6-aharon-yair-cohens-projects.vercel.app
          E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
          E2E_GITHUB_REPO: ${{ secrets.E2E_GITHUB_REPO }}
          E2E_CHAT_MODEL: ${{ vars.E2E_CHAT_MODEL }}
          RUN_REAL_E2E: "1"
          CI: "true"
