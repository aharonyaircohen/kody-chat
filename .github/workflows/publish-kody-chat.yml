name: Publish Kody Chat

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm distribution tag
        required: true
        default: next
        type: choice
        options:
          - next
          - latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kody-ade/kody-chat test:external-package
      - run: npm publish ./packages/kody-chat/library --tag "${{ inputs.tag }}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
