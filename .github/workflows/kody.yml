# Standard Kody launcher. Capability behavior lives in the engine and Store.
name: kody

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number (agent mode)"
        type: string
        default: ""
      sessionId:
        description: "Chat session ID (chat mode)"
        type: string
        default: ""
      message:
        description: "Initial chat message (optional)"
        type: string
        default: ""
      capability:
        description: "Capability to run (default: run)"
        type: string
        default: ""
      model:
        description: "Model override (optional)"
        type: string
        default: ""
      dashboardUrl:
        description: "Dashboard event ingest URL (chat mode)"
        type: string
        default: ""
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: kody-${{ inputs.sessionId || inputs.issue_number || inputs.capability || github.event.issue.number || github.sha }}
      cancel-in-progress: false
    permissions:
      issues: write
      pull-requests: write
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref || github.ref }}
          token: ${{ secrets.KODY_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Hydrate Kody Store definitions
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.KODY_STORE_REPOSITORY || 'aharonyaircohen/kody-company-store' }}
          ref: ${{ vars.KODY_STORE_REF || 'main' }}
          path: .kody-engine/definitions
          token: ${{ secrets.KODY_TOKEN || github.token }}

      - env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          SESSION_ID: ${{ inputs.sessionId }}
          INIT_MESSAGE: ${{ inputs.message }}
          MODEL: ${{ inputs.model }}
          DASHBOARD_URL: ${{ inputs.dashboardUrl }}
          KODY_DEFINITIONS_ROOT: ${{ github.workspace }}/.kody-engine/definitions
          KODY_DEFINITIONS_ROOT_CWD: ${{ github.workspace }}
        working-directory: ${{ github.workspace }}
        run: |
          test -f .kody-engine/definitions/capabilities/dispatch-due-loops/profile.json
          test -f .kody-engine/definitions/capabilities/dispatch-due-loops/capability.md
          node -e 'const p=require("./.kody-engine/definitions/capabilities/dispatch-due-loops/profile.json"); console.log(JSON.stringify({action:p.action,role:p.role,internal:p.internal,public:p.public,implementations:p.implementations}))'
          npx -y -p @kody-ade/kody-engine@latest kody-engine ci --cwd "$GITHUB_WORKSPACE"
