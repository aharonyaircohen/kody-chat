# Fly app config used ONLY to host the builder image in the Fly registry.
# No service runs here. The dashboard pulls this image when spawning
# per-build Fly Machines elsewhere.
#
# To push a new builder image after editing src/ or default-Dockerfile.preview:
#   flyctl deploy -c builder/fly.toml --app kody-preview-builder --build-only --push --image-label latest

app = "kody-preview-builder"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"
